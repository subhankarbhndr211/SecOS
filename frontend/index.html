<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecOS v6.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{background:#020508;height:100%;width:100%;overflow:hidden}
    #boot{position:fixed;inset:0;background:#020508;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:18px;z-index:99999;
      font-family:'Orbitron','Courier New',monospace;}
    #boot .logo{font-size:32px;color:#00d4ff;letter-spacing:10px;font-weight:900}
    #boot .sub{font-size:10px;color:#4888aa;letter-spacing:4px;text-transform:uppercase}
    #boot .bar{width:220px;height:2px;background:#0c1e2e;border-radius:2px;overflow:hidden}
    #boot .bar-inner{height:100%;background:#00d4ff;animation:load 1.4s ease-in-out forwards}
    @keyframes load{from{width:0}to{width:100%}}
  </style>
</head>
<body>
  <div id="boot">
    <div class="logo">SecOS</div>
    <div class="sub">Autonomous Security Operating System v6.0</div>
    <div class="bar"><div class="bar-inner"></div></div>
  </div>
  <div id="root"></div>
  <script src="/react.min.js"></script>
  <script src="/react-dom.min.js"></script>
  <script src="/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;







const _FL = document.createElement("link");
_FL.rel = "stylesheet";
_FL.href = "https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap";
document.head.appendChild(_FL);

const C = {
  bg:"#020508", surface:"#050b10", card:"#080f18", border:"#0c1e2e", borderHi:"#164060",
  accent:"#00d4ff", accentDim:"#006b80", green:"#00ff88", greenDim:"#008844",
  amber:"#ffb800", red:"#ff2244", purple:"#b060ff", orange:"#ff6010",
  cyan:"#00eeff", pink:"#ff40a0", teal:"#00c8b0",
  textHi:"#dff0ff", text:"#4888aa", dim:"#0c1e2e", grid:"rgba(0,180,255,0.03)",
};

const rnd  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const ts   = () => new Date().toLocaleTimeString("en-GB",{hour12:false});
const uid  = () => Math.random().toString(36).slice(2,10).toUpperCase();
const pct  = (v,m) => Math.round((v/m)*100);

// Constants used by UI components (display only, no mock data generation)
const SEVS  = ["CRITICAL","HIGH","MEDIUM","LOW"];
const HOSTS = []; // populated from real alerts
const IPS   = []; // populated from real alerts
const USERS = []; // populated from real alerts
const RULES = []; // populated from real alerts
const MITRE = []; // populated from real alerts
const TACTICS=[];
const DEPTS = [];
const ROLES = [];

//  STYLES 
const S = () => {
  if(document.getElementById("secos-v6"))return;
  const el=document.createElement("style"); el.id="secos-v6";
  el.textContent=`
  *{box-sizing:border-box;margin:0;padding:0}
  .v6{font-family:'Rajdhani',sans-serif;background:${C.bg};color:${C.text};height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .mono{font-family:'Share Tech Mono',monospace!important}
  .orb{font-family:'Orbitron',sans-serif!important}
  .gbg{position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(${C.grid} 1px,transparent 1px),linear-gradient(90deg,${C.grid} 1px,transparent 1px);
    background-size:36px 36px}
  .scan{position:fixed;inset:0;pointer-events:none;z-index:1;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,0.012) 2px,rgba(0,200,255,0.012) 4px);
    animation:sm 10s linear infinite}
  @keyframes sm{from{background-position:0 0}to{background-position:0 -200px}}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-track{background:${C.surface}}
  ::-webkit-scrollbar-thumb{background:${C.accentDim};border-radius:2px}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fi{animation:fi .25s ease forwards}
  @keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
  .bk{animation:bk 1s infinite}
  @keyframes pl{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.35)}70%{box-shadow:0 0 0 5px rgba(0,212,255,0)}}
  .pl{animation:pl 2s infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .spin{animation:rot 2s linear infinite;display:inline-block}
  @keyframes si{from{transform:translateX(100%)}to{transform:translateX(0)}}
  .si{animation:si .3s cubic-bezier(.16,1,.3,1) forwards}
  .card{background:${C.card};border:1px solid ${C.border};border-radius:4px;padding:14px;transition:border-color .2s}
  .card:hover{border-color:${C.borderHi}}
  .btn{padding:6px 14px;border:1px solid ${C.border};background:transparent;color:${C.text};cursor:pointer;
    font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:1px;border-radius:3px;transition:all .2s;white-space:nowrap}
  .btn:hover{border-color:${C.accent};color:${C.accent};background:rgba(0,212,255,.05)}
  .btn.p{border-color:${C.accent};color:${C.accent};background:rgba(0,212,255,.07)}
  .btn.p:hover{background:rgba(0,212,255,.14)}
  .btn.d{border-color:${C.red};color:${C.red};background:rgba(255,34,68,.07)}
  .btn.d:hover{background:rgba(255,34,68,.14)}
  .btn.g{border-color:${C.green};color:${C.green};background:rgba(0,255,136,.07)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .inp{background:${C.surface};border:1px solid ${C.border};color:${C.textHi};
    padding:7px 11px;font-family:'Share Tech Mono',monospace;font-size:12px;border-radius:3px;outline:none;width:100%}
  .inp:focus{border-color:${C.accent}}
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{color:${C.text};font-weight:600;letter-spacing:1.2px;text-transform:uppercase;font-size:10px;
    padding:7px 10px;border-bottom:1px solid ${C.border};text-align:left;white-space:nowrap}
  .tbl td{padding:8px 10px;border-bottom:1px solid rgba(12,30,46,.7);color:${C.textHi};vertical-align:middle}
  .tbl tr:hover td{background:rgba(0,212,255,.025)}
  .sev-CRITICAL{color:${C.red};background:rgba(255,34,68,.1);border:1px solid rgba(255,34,68,.25)}
  .sev-HIGH{color:${C.orange};background:rgba(255,96,16,.1);border:1px solid rgba(255,96,16,.25)}
  .sev-MEDIUM{color:${C.amber};background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.25)}
  .sev-LOW{color:${C.green};background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.25)}
  .sbadge{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.8px;font-family:'Share Tech Mono',monospace}
  .hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;
    font-family:'Orbitron',sans-serif;font-size:11px;color:${C.accent};letter-spacing:2px;text-transform:uppercase}
  .hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,${C.border},transparent)}
  .tab{padding:7px 14px;cursor:pointer;border:1px solid transparent;border-bottom:none;
    font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;transition:all .2s;color:${C.text};background:transparent;white-space:nowrap}
  .tab:hover{color:${C.accent}}
  .tab.on{color:${C.accent};border-color:${C.border};border-bottom:2px solid ${C.accent};background:${C.surface}}
  .rbar{height:4px;background:${C.dim};border-radius:2px;overflow:hidden}
  .rfill{height:100%;border-radius:2px;transition:width .6s}
  .dg{width:7px;height:7px;border-radius:50%;background:${C.green};box-shadow:0 0 5px ${C.green}}
  .dr{width:7px;height:7px;border-radius:50%;background:${C.red};box-shadow:0 0 5px ${C.red}}
  .da{width:7px;height:7px;border-radius:50%;background:${C.amber};box-shadow:0 0 5px ${C.amber}}
  .dd{width:7px;height:7px;border-radius:50%;background:${C.dim}}
  .panel{position:fixed;top:0;right:0;width:540px;height:100vh;
    background:${C.surface};border-left:1px solid ${C.border};z-index:100;display:flex;flex-direction:column}
  .log{padding:3px 0;font-size:11px;font-family:'Share Tech Mono',monospace;border-bottom:1px solid rgba(12,30,46,.5)}
  `;
  document.head.appendChild(el);
};

//  SHARED COMPONENTS 
const Badge = ({sev}) => <span className={`sbadge sev-${sev}`}>{sev}</span>;
const Dot   = ({s}) => <div className={s==="ONLINE"?"dg pl":s==="WARN"?"da":s==="OFF"?"dr":"dd"}/>;
const Hdr   = ({children}) => <div className="hdr">{children}</div>;
const RBar  = ({v,max=100,color}) => (
  <div className="rbar"><div className="rfill" style={{width:`${pct(v,max)}%`,background:color||( v>70?C.red:v>50?C.amber:C.green)}}/></div>
);
const KPICard = ({label,value,color,sub}) => (
  <div className="card" style={{textAlign:"center"}}>
    <div style={{fontSize:10,color:C.text,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>{label}</div>
    <div className="orb" style={{fontSize:30,fontWeight:900,color:color||C.accent}}>{value}</div>
    {sub&&<div style={{fontSize:10,color:C.text,marginTop:2}}>{sub}</div>}
  </div>
);


// LOGIN

function Login({onLogin}) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [e,setE]=useState(""); const [ld,setLd]=useState(false);
  const CREDS={admin:"Admin1234",analyst:"Analyst123",soc:"SOCteam123"};
  const go=()=>{
    if(!u||!p){setE("Credentials required");return;}
    setLd(true);
    setTimeout(()=>{
      if(CREDS[u.toLowerCase()]===p) onLogin({user:u.toLowerCase(),role:u.toLowerCase()==="admin"?"ADMIN":u.toLowerCase()==="soc"?"SOC LEAD":"ANALYST"});
      else{setE("Authentication failed");setLd(false);}
    },700);
  };
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      <div className="gbg"/><div className="scan"/>
      <div className="card" style={{width:400,padding:36,position:"relative",zIndex:2}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div className="orb" style={{fontSize:26,fontWeight:900,color:C.accent,letterSpacing:6}}>SecOS</div>
          <div style={{color:C.text,fontSize:10,letterSpacing:3,marginTop:4}}>AUTONOMOUS SECURITY OPERATING SYSTEM  v6.0</div>
          <div style={{display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap",marginTop:10}}>
            {["SIEM","EDR","NDR","SOAR","XDR","IAM","UEBA","TIP","VULN"].map(m=>(
              <span key={m} className="mono" style={{fontSize:9,color:C.accentDim,padding:"1px 5px",border:`1px solid ${C.dim}`,borderRadius:2}}>{m}</span>
            ))}
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{color:C.text,fontSize:10,letterSpacing:2,marginBottom:5,textTransform:"uppercase"}}>Username</div>
          <input className="inp" value={u} onChange={ev=>setU(ev.target.value)} placeholder="admin / analyst / soc" onKeyDown={ev=>ev.key==="Enter"&&go()} autoFocus/>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{color:C.text,fontSize:10,letterSpacing:2,marginBottom:5,textTransform:"uppercase"}}>Password</div>
          <input className="inp" type="password" value={p} onChange={ev=>setP(ev.target.value)} placeholder="" onKeyDown={ev=>ev.key==="Enter"&&go()}/>
        </div>
        {e&&<div className="mono" style={{color:C.red,fontSize:11,marginBottom:10,textAlign:"center"}}> {e}</div>}
        <button className="btn p" style={{width:"100%",padding:11,fontSize:13,letterSpacing:2}} onClick={go} disabled={ld}>
          {ld?"AUTHENTICATING":"AUTHENTICATE "}
        </button>
        <div style={{marginTop:16,padding:10,background:C.surface,borderRadius:3,border:`1px solid ${C.dim}`}}>
          <div style={{color:C.text,fontSize:10,letterSpacing:1,marginBottom:4}}>CREDENTIALS</div>
          <div className="mono" style={{fontSize:10,color:C.text,lineHeight:1.7}}>
            admin / Admin1234<br/>analyst / Analyst123<br/>soc / SOCteam123
          </div>
        </div>
      </div>
    </div>
  );
}


// TOP BAR

function TopBar({session,alerts,risk,onLogout,apiOnline,wsConnected}) {
  const [t,setT]=useState(ts());
  useEffect(()=>{const i=setInterval(()=>setT(ts()),1000);return()=>clearInterval(i);},[]);
  const crit=alerts.filter(a=>a.severity==="CRITICAL"&&a.status==="NEW").length;
  return (
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 16px",height:50,display:"flex",alignItems:"center",gap:12,flexShrink:0,position:"relative",zIndex:10}}>
      <div className="orb" style={{fontSize:16,fontWeight:900,color:C.accent,letterSpacing:4,marginRight:4}}>SecOS</div>
      <span style={{fontSize:9,color:C.accentDim,padding:"2px 6px",border:`1px solid ${C.dim}`,borderRadius:2}} className="mono">v6.0</span>
      <div style={{width:1,height:24,background:C.border}}/>
      {[
        {l:"ALERTS",v:alerts.length,c:C.textHi},
        {l:"CRITICAL",v:crit,c:crit>0?C.red:C.greenDim},
        {l:"OPEN",v:alerts.filter(a=>a.status==="INVESTIGATING").length,c:C.amber},
        {l:"ORG RISK",v:risk+"%",c:risk>70?C.red:risk>50?C.amber:C.green},
      ].map(k=>(
        <div key={k.l} style={{padding:"3px 12px",borderRight:`1px solid ${C.border}`}}>
          <div style={{fontSize:8,color:C.text,letterSpacing:1.5,textTransform:"uppercase"}}>{k.l}</div>
          <div className="mono" style={{fontSize:12,color:k.c,fontWeight:700}}>{k.v}</div>
        </div>
      ))}
      <div style={{flex:1}}/>
      <div className="mono" style={{fontSize:11,color:C.text}}>{t}</div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <div className="dg pl"/>
        <span style={{fontSize:12,color:C.textHi,letterSpacing:1}}>{session.user}</span>
        <span style={{fontSize:9,color:C.accentDim,padding:"1px 5px",border:`1px solid ${C.dim}`,borderRadius:2}}>{session.role}</span>
      </div>
      <button className="btn" style={{fontSize:10,padding:"3px 8px"}} onClick={onLogout}>LOGOUT</button>
      <span style={{marginLeft:6,fontSize:9,fontFamily:"monospace",
        color:wsConnected?"#00ff88":"#ff2244",letterSpacing:1}}>
        {wsConnected?" LIVE":" OFFLINE"}
      </span>
      <span style={{marginLeft:4,fontSize:9,fontFamily:"monospace",
        color:apiOnline?"#00ff88":"#ff2244",letterSpacing:1}}>
        {apiOnline?"API":"NO API"}
      </span>
    </div>
  );
}


// MODULE: IAM  Identity & Access Management

function IAMModule({alerts}) {
  const [selUser,setSel]=useState(null);
  const [action,setAction]=useState(null);
  const [log,setLog]=useState([]);

  const [IDENTITY_DB,setIdentityDB]=useState([]);
  useEffect(()=>{
    // Load real users from /api/assets or derive from IAM alerts
    fetch("/api/assets",{headers:{Authorization:"Bearer "+(window._secosToken||"")}})
      .then(r=>r.ok?r.json():null).then(d=>{
        if(d?.assets?.length) setIdentityDB(d.assets.filter(a=>a.type==="user"||!a.type));
      }).catch(()=>{});
  },[]);
  const PRIV_ACCOUNTS = IDENTITY_DB.filter(u=>u.privileged||u.is_admin);
  const RISKY = [...IDENTITY_DB].sort((a,b)=>(b.risk_score||0)-(a.risk_score||0)).slice(0,4);

  const doAction=(user,act)=>{
    setLog(p=>[{ts:ts(),user:user.username,action:act,msg:`${act} executed on ${user.username}`},...p]);
    setAction(null);
  };

  return (
    <div style={{padding:14,height:"100%",overflow:"auto",display:"flex",flexDirection:"column",gap:12}}>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,flexShrink:0}}>
        {[
          {l:"Total Identities",v:IDENTITY_DB.length,c:C.accent},
          {l:"Privileged Accts",v:PRIV_ACCOUNTS.length,c:C.orange},
          {l:"MFA Enabled",v:IDENTITY_DB.filter(u=>u.mfa).length,c:C.green},
          {l:"Locked Out",v:IDENTITY_DB.filter(u=>u.lockedOut).length,c:C.red},
          {l:"Active Sessions",v:IDENTITY_DB.reduce((s,u)=>s+u.sessions,0),c:C.cyan},
        ].map(k=><KPICard key={k.l} label={k.l} value={k.v} color={k.c}/>)}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,flex:1,minHeight:0}}>
        {/* Identity table */}
        <div className="card" style={{overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <Hdr>Identity Registry</Hdr>
          <div style={{overflow:"auto",flex:1}}>
            <table className="tbl">
              <thead><tr><th>User</th><th>Dept</th><th>Risk</th><th>MFA</th><th>Status</th><th></th></tr></thead>
              <tbody>
                {IDENTITY_DB.map(u=>(
                  <tr key={u.username} style={{cursor:"pointer"}} onClick={()=>setSel(u)}>
                    <td>
                      <div className="mono" style={{color:u.privileged?C.orange:C.textHi,fontSize:11}}>{u.username}</div>
                      <div style={{fontSize:9,color:C.text}}>{u.role}</div>
                    </td>
                    <td style={{fontSize:11,color:C.text}}>{u.dept}</td>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:36,height:3,background:C.dim,borderRadius:2}}>
                          <div style={{width:`${u.riskScore}%`,height:"100%",background:u.riskScore>70?C.red:u.riskScore>50?C.amber:C.green,borderRadius:2}}/>
                        </div>
                        <span className="mono" style={{fontSize:10,color:u.riskScore>70?C.red:C.text}}>{u.riskScore}</span>
                      </div>
                    </td>
                    <td><span style={{fontSize:10,color:u.mfa?C.green:C.red}}>{u.mfa?" ON":" OFF"}</span></td>
                    <td>
                      {u.lockedOut
                        ? <span style={{fontSize:10,color:C.red}} className="bk">LOCKED</span>
                        : <span style={{fontSize:10,color:u.active?C.greenDim:C.text}}>{u.active?"ACTIVE":"INACTIVE"}</span>}
                    </td>
                    <td><button className="btn p" style={{fontSize:9,padding:"2px 7px"}} onClick={e=>{e.stopPropagation();setSel(u);}}>VIEW</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Privileged accounts */}
          <div className="card">
            <Hdr>Privileged Account Monitor</Hdr>
            {PRIV_ACCOUNTS.map(u=>(
              <div key={u.username} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.surface,borderRadius:3,border:`1px solid ${u.riskScore>60?C.orange:C.border}`,marginBottom:6}}>
                <div>
                  <div className="mono" style={{color:C.orange,fontSize:12}}>{u.username}</div>
                  <div style={{fontSize:10,color:C.text}}>{u.groups.join("  ")}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div className="mono" style={{fontSize:10,color:u.riskScore>60?C.red:C.text}}>Risk: {u.riskScore}</div>
                  <div style={{fontSize:9,color:C.text}}>{u.lastLogin}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Auth event log */}
          <div className="card" style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <Hdr>IAM Action Log</Hdr>
            <div style={{overflow:"auto",flex:1}}>
              {[...log,...alerts.filter(a=>a.source==="IAM"||a.user).slice(0,6).map(a=>({
                ts:a.timestamp, user:a.user||"unknown",
                action:a.rule||"SECURITY_EVENT",
              }))].map((e,i)=>(
                <div key={i} className="log fi">
                  <span style={{color:C.accentDim}}>[{e.ts}]</span>{" "}
                  <span style={{color:e.action.includes("FAIL")||e.action.includes("BYPASS")||e.action.includes("ESCAL")?C.red:C.greenDim}}>{e.action}</span>{" "}
                  <span style={{color:C.textHi}} className="mono">{e.user}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* User detail modal */}
      {selUser&&(
        <>
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:99}} onClick={()=>setSel(null)}/>
          <div className="panel si" style={{width:460}}>
            <div style={{padding:"16px 18px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div className="orb" style={{fontSize:10,color:C.accentDim,letterSpacing:2}}>IDENTITY PROFILE</div>
                  <div className="mono" style={{fontSize:18,color:selUser.privileged?C.orange:C.textHi,marginTop:4}}>{selUser.username}</div>
                  <div style={{color:C.text,fontSize:12,marginTop:2}}>{selUser.role}  {selUser.dept}</div>
                </div>
                <button className="btn" onClick={()=>setSel(null)}></button>
              </div>
            </div>
            <div style={{flex:1,overflow:"auto",padding:18}}>
              {/* Details grid */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                {[
                  ["Risk Score",selUser.riskScore,selUser.riskScore>70?C.red:selUser.riskScore>50?C.amber:C.green],
                  ["Active Sessions",selUser.sessions,C.textHi],
                  ["Failed Logins",selUser.failedLogins,selUser.failedLogins>3?C.red:C.textHi],
                  ["Password Age",selUser.passwordAge+" days",selUser.passwordAge>90?C.red:C.textHi],

  const blocked = flows.filter(f=>f.verdict==="BLOCK").length;

// MODULE: XDR  Cross-layer Detection & Response

function XDRModule({alerts}) {
  // Build XDR incidents from real correlated alerts
  const incidentMap={};
  alerts.forEach(a=>{
    const key=a.host||a.src_ip||"unknown";
    if(!incidentMap[key]){
      incidentMap[key]={
        id:key, host:key, score:0,
        status:"ACTIVE", timeline:[],
        layers:{endpoint:false,network:false,identity:false,cloud:false,email:false},
        alerts:[],
      };
    }
    incidentMap[key].alerts.push(a);
    incidentMap[key].score=Math.min(100,incidentMap[key].score+(a.severity==="CRITICAL"?25:a.severity==="HIGH"?10:5));
    if(a.source==="EDR") incidentMap[key].layers.endpoint=true;
    if(a.source==="NDR") incidentMap[key].layers.network=true;
    if(a.source==="IAM") incidentMap[key].layers.identity=true;
    incidentMap[key].timeline.push({layer:a.source||"SIEM",event:a.rule,ts:a.timestamp,host:a.host});
  });
  const [incidents] = [Object.values(incidentMap).sort((a,b)=>b.score-a.score).slice(0,20)];
  const [sel,setSel]=useState(null);

  const LAYER_COLOR={endpoint:C.green,network:C.accent,identity:C.orange,cloud:C.purple,email:C.pink};

  return (
    <div style={{padding:14,height:"100%",overflow:"hidden",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,flexShrink:0}}>
        <KPICard label="XDR Incidents" value={incidents.length} color={C.accent}/>
        <KPICard label="Active" value={incidents.filter(i=>i.status==="ACTIVE").length} color={C.red}/>
        <KPICard label="Multi-layer" value={incidents.filter(i=>Object.values(i.layers).filter(Boolean).length>=3).length} color={C.orange}/>
        <KPICard label="Avg Score" value={Math.round(incidents.reduce((s,i)=>s+i.score,0)/incidents.length)} color={C.amber}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:12,flex:1,minHeight:0,overflow:"hidden"}}>
        {/* Incident list */}
        <div className="card" style={{overflow:"auto"}}>
          <Hdr>XDR Incidents</Hdr>
          {incidents.map(inc=>(
            <div key={inc.id} style={{padding:"10px",background:sel===inc.id?C.surface:C.bg,
              border:`1px solid ${sel===inc.id?C.accent:inc.status==="ACTIVE"?`rgba(255,34,68,.3)`:C.border}`,
              borderRadius:3,marginBottom:6,cursor:"pointer"}} onClick={()=>setSel(inc.id===sel?null:inc.id)}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <Badge sev={inc.severity}/>
                <span style={{fontSize:10,color:inc.status==="ACTIVE"?C.red:inc.status==="CONTAINED"?C.amber:C.greenDim,fontWeight:700}}>{inc.status}</span>

              <div style={{color:C.textHi,fontSize:12,fontWeight:600,marginBottom:5}}>{inc.title}</div>
              <div style={{display:"flex",gap:4,marginBottom:5}}>
                {Object.entries(inc.layers).map(([layer,active])=>(
                  <span key={layer} style={{fontSize:9,padding:"1px 5px",borderRadius:2,
                    background:active?`rgba(0,0,0,.3)`:C.surface,
                    border:`1px solid ${active?LAYER_COLOR[layer]:C.border}`,

              <div style={{display:"flex",gap:12}}>

                      </div>
                      <div style={{flex:1,padding:"7px 10px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:3}}>
                        <div style={{color:C.textHi,fontSize:12}}>{e.event} on <span className="mono" style={{color:C.accent}}>{e.host}</span></div>
                        <div className="mono" style={{fontSize:9,color:C.text,marginTop:2}}>{e.ts}</div>

                  ))}
                  {/* Response actions */}
                  <div style={{marginTop:10,display:"flex",gap:8}}>
                    <button className="btn d" style={{flex:1}}>CONTAIN ALL HOSTS</button>
                    <button className="btn p" style={{flex:1}}>OPEN IR PLAYBOOK</button>

function VulnModule() {
  const [sel,setSel]=useState(null);
  const CVSS_COLOR = s => s>=9?C.red:s>=7?C.orange:s>=4?C.amber:C.green;

  const [vulns, setVulns] = useState([]);
  useEffect(()=>{
    fetch("/api/vuln/findings",{headers:{Authorization:"Bearer "+(window._secosToken||"")}})
      .then(r=>r.ok?r.json():null).then(d=>{
        if(d?.findings) setVulns(d.findings);
      }).catch(()=>{});
  },[]);

  const grouped=vulns.reduce((acc,v)=>{acc[v.severity]=(acc[v.severity]||[]);acc[v.severity].push(v);return acc},{});

  return (
    <div style={{padding:14,height:"100%",overflow:"auto",display:"flex",flexDirection:"column",gap:12}}>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,flexShrink:0}}>
        <KPICard label="Total CVEs" value={vulns.length} color={C.accent}/>
        <KPICard label="Critical" value={(grouped.CRITICAL||[]).length} color={C.red}/>
        <KPICard label="High" value={(grouped.HIGH||[]).length} color={C.orange}/>
        <KPICard label="Actively Exploited" value={vulns.filter(v=>v.exploited).length} color={C.red} sub=" CISA KEV"/>
        <KPICard label="Patch Available" value={vulns.filter(v=>v.patchAvail).length} color={C.green}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:12,flex:1,minHeight:0,overflow:"hidden"}}>
        <div className="card" style={{overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <Hdr>Vulnerability Registry</Hdr>
          <div style={{overflow:"auto",flex:1}}>
            <table className="tbl">
              <thead><tr><th>CVE</th><th>Title</th><th>Host</th><th>CVSS</th><th>Severity</th><th>Exploited</th><th>Patch</th><th>Status</th></tr></thead>
              <tbody>
                {[...vulns].sort((a,b)=>b.cvss-a.cvss).map(v=>(
                  <tr key={v.id+v.host} style={{cursor:"pointer"}} onClick={()=>setSel(v)}>
                    <td className="mono" style={{fontSize:10,color:C.accentDim}}>{v.id}</td>
                    <td style={{color:C.textHi,fontSize:12}}>{v.title}</td>
                    <td className="mono" style={{fontSize:10,color:C.accent}}>{v.host}</td>
                    <td><span className="mono" style={{fontSize:12,fontWeight:700,color:CVSS_COLOR(v.cvss)}}>{v.cvss}</span></td>
                    <td><Badge sev={v.severity}/></td>
                    <td><span style={{color:v.exploited?C.red:C.greenDim,fontSize:11}}>{v.exploited?" YES":"NO"}</span></td>
                    <td><span style={{color:v.patchAvail?C.green:C.red,fontSize:11}}>{v.patchAvail?"AVAIL":"NONE"}</span></td>
                    <td><span style={{fontSize:10,color:v.status==="PATCHED"?C.greenDim:v.status==="IN REMEDIATION"?C.amber:C.text}}>{v.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12,overflow:"auto"}}>
          {/* Severity breakdown */}
          <div className="card">
            <Hdr>Severity Breakdown</Hdr>
            {SEVS.map(s=>(
              <div key={s} style={{marginBottom:9}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <Badge sev={s}/>
                  <span className="mono" style={{fontSize:11,color:C.text}}>{(grouped[s]||[]).length}</span>
                </div>
                <RBar v={(grouped[s]||[]).length} max={vulns.length}/>
              </div>
            ))}
          </div>
          {/* Asset risk from vulns */}
          <div className="card" style={{flex:1}}>
            <Hdr>Asset Exposure</Hdr>
            {HOSTS.map(h=>{
              const hv=vulns.filter(v=>v.host===h);
              const score=Math.min(100,hv.reduce((s,v)=>s+v.cvss*2,0)/10);
              return (
                <div key={h} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span className="mono" style={{fontSize:10,color:C.textHi}}>{h}</span>
                    <span className="mono" style={{fontSize:10,color:score>70?C.red:C.text}}>{hv.length} CVEs</span>
                  </div>
                  <RBar v={score}/>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// MODULE: TIP  Threat Intelligence Platform (self-learning)

function TIPModule({alerts}) {
  const [query,setQuery]=useState(""); const [result,setResult]=useState(null); const [searching,setSearching]=useState(false);
  const [learnedIOCs,setLearned]=useState([]);

  // Auto-learn from alerts
  useEffect(()=>{
    const newIOCs=alerts.filter(a=>a.severity!=="LOW").slice(0,5).map(a=>({
      value:a.src_ip, type:"ip", confidence:a.score, source:"INTERNAL_HUNT",
      tags:[a.tactic,a.mitre], firstSeen:a.timestamp, apt:a.apt,
    }));
    setLearned(newIOCs);
  },[alerts]);

  const FEEDS=[
    {name:"MISP Community",status:"LIVE",iocs:14823,updated:"2m ago",type:"Open Source"},
    {name:"AlienVault OTX",status:"LIVE",iocs:9241,updated:"8m ago",type:"Community"},
    {name:"CISA KEV",status:"LIVE",iocs:1142,updated:"1h ago",type:"Government"},
    {name:"Emerging Threats",status:"LIVE",iocs:7883,updated:"15m ago",type:"Commercial"},
    {name:"Internal Hunt",status:"LIVE",iocs:learnedIOCs.length,updated:"Live",type:"Self-Learned"},
    {name:"Abuse.ch",status:"LIVE",iocs:3341,updated:"30m ago",type:"Open Source"},
  ];

  const enrich=()=>{
    if(!query)return; setSearching(true);
    fetch("/api/tip/enrich?ioc="+encodeURIComponent(query),{
      headers:{Authorization:"Bearer "+(window._secosToken||"")}
    }).then(r=>r.ok?r.json():null).then(d=>{
      if(d){
        setResult({
          value:query,
          verdict:d.verdict||"UNKNOWN",
          confidence:d.confidence||0,
          type:d.type||(/^\d+\.\d+/.test(query)?"IP":query.length===32||query.length===64?"Hash":"Domain"),
          feeds:d.feeds||[],
          apt:d.apt||null,
          tags:d.tags||[],
          geoIP:d.geo||"",
          firstSeen:d.first_seen||"Unknown",
          lastSeen:d.last_seen||"Unknown",
        });
      } else {
        setResult({value:query,verdict:"NO DATA",confidence:0,type:"Unknown",feeds:[],apt:null,tags:[],geoIP:"",firstSeen:"",lastSeen:""});
      }
      setSearching(false);
    },700);
  };

  const APTS_DETAIL=[
    {name:"APT29",nation:"Russia",active:true,campaigns:["SolarWinds","NOBELIUM"],techniques:["T1078","T1566","T1059"]},
    {name:"APT41",nation:"China",active:true,campaigns:["Operation Wicked Panda"],techniques:["T1190","T1486","T1071"]},
    {name:"Lazarus",nation:"N.Korea",active:true,campaigns:["BlueNoroff","AppleJeus"],techniques:["T1140","T1041","T1027"]},
    {name:"Scattered Spider",nation:"Criminal",active:false,campaigns:["Twilio","MGM Breach"],techniques:["T1621","T1078"]},
  ];

  return (
    <div style={{padding:14,height:"100%",overflow:"auto",display:"flex",flexDirection:"column",gap:12}}>
      {/* IOC Lookup */}
      <div className="card">
        <Hdr>IOC Enrichment & Lookup</Hdr>
        <div style={{display:"flex",gap:8}}>
          <input className="inp" style={{flex:1}} placeholder="Enter IP, domain, hash, URL" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enrich()}/>
          <button className="btn p" onClick={enrich} disabled={searching}>{searching?"SEARCHING":"ENRICH IOC"}</button>
        </div>
        {result&&(
          <div style={{marginTop:12,padding:"12px",background:C.surface,border:`1px solid ${result.verdict==="MALICIOUS"?C.red:C.green}`,borderRadius:3}} className="fi">
            <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:8}}>
              <div><div style={{fontSize:9,color:C.text,letterSpacing:1}}>VERDICT</div><div style={{color:result.verdict==="MALICIOUS"?C.red:C.green,fontSize:15,fontWeight:700}}>{result.verdict}</div></div>
              <div><div style={{fontSize:9,color:C.text,letterSpacing:1}}>TYPE</div><div style={{color:C.textHi,fontSize:13}}>{result.type}</div></div>
              <div><div style={{fontSize:9,color:C.text,letterSpacing:1}}>CONFIDENCE</div><div className="mono" style={{color:C.amber,fontSize:13}}>{result.confidence}%</div></div>
              <div><div style={{fontSize:9,color:C.text,letterSpacing:1}}>SEEN IN FEEDS</div><div style={{color:C.textHi,fontSize:13}}>{result.feeds.join(", ")}</div></div>
              {result.apt&&<div><div style={{fontSize:9,color:C.text,letterSpacing:1}}>APT</div><div style={{color:C.orange,fontSize:13}}>{result.apt}</div></div>}
              {result.geoIP&&<div><div style={{fontSize:9,color:C.text,letterSpacing:1}}>GEO</div><div style={{color:["RU","CN","KP","IR"].includes(result.geoIP)?C.red:C.textHi,fontSize:13}}>{result.geoIP}</div></div>}
            </div>
            <div style={{display:"flex",gap:5}}>{result.tags.map(t=><span key={t} style={{fontSize:9,padding:"1px 6px",border:`1px solid ${C.border}`,borderRadius:2,color:C.text}}>{t}</span>)}</div>
          </div>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {/* Feeds */}
        <div className="card">
          <Hdr>Threat Intelligence Feeds</Hdr>
          {FEEDS.map(f=>(
            <div key={f.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.surface,border:`1px solid ${f.type==="Self-Learned"?C.purple:C.border}`,borderRadius:3,marginBottom:6}}>

              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <div className="dg pl"/><span className="mono" style={{fontSize:9,color:C.greenDim}}>{f.status}</span>
              </div>
            </div>
          ))}
        </div>

        {/* APT tracking */}
        <div className="card">
          <Hdr>APT Actor Tracking</Hdr>
          {APTS_DETAIL.map(a=>(
            <div key={a.name} style={{padding:"9px 10px",background:C.surface,border:`1px solid ${a.active?C.borderHi:C.border}`,borderRadius:3,marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{color:a.active?C.textHi:C.text,fontSize:13,fontWeight:700}}>{a.name}</span>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div className={a.active?"dr pl":"dd"}/><span style={{fontSize:10,color:a.active?C.red:C.text}}>{a.active?"ACTIVE":"DORMANT"}</span>
                </div>
              </div>
              <div style={{fontSize:11,color:C.text,marginBottom:5}}>{a.nation}  {a.campaigns.join(", ")}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {a.techniques.map(t=><span key={t} className="mono" style={{fontSize:9,padding:"1px 5px",background:C.card,border:`1px solid ${C.border}`,borderRadius:2,color:C.accentDim}}>{t}</span>)}
              </div>
            </div>
          ))}
        </div>

        {/* Self-learned IOCs */}
        <div className="card" style={{gridColumn:"1/-1"}}>
          <Hdr> Self-Learned IOCs (from live detections)</Hdr>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {learnedIOCs.map((ioc,i)=>(
              <div key={i} style={{padding:"7px 10px",background:C.surface,border:`1px solid ${C.purple}`,borderRadius:3,fontSize:11}}>
                <div className="mono" style={{color:C.purple,marginBottom:2}}>{ioc.value}</div>
                <div style={{color:C.text,fontSize:10}}>{ioc.type}  conf:{ioc.confidence}%</div>
                {ioc.apt&&<div style={{color:C.orange,fontSize:9,marginTop:2}}>{ioc.apt}</div>}
              </div>
            ))}
            {learnedIOCs.length===0&&<div style={{color:C.text,fontSize:12}}>Collecting from live alerts</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function SIEMModule({alerts}) {
  const [subTab,setSub]=useState("search");
  const [q,setQ]=useState(""); const [results,setResults]=useState([]); const [searching,setSrch]=useState(false);
  const [rules,setRules]=useState(SIEM_RULES);
  const [selRule,setSelRule]=useState(null);

  const search=()=>{
    setSrch(true);
    setTimeout(()=>{
      const res=alerts.filter(a=>!q||a.rule.toLowerCase().includes(q.toLowerCase())||a.host.toLowerCase().includes(q.toLowerCase())||a.src_ip.includes(q)||a.user.includes(q));
      setResults(res.slice(0,80));
      setSrch(false);
    },400);
  };

  const toggleRule=(id)=>setRules(p=>p.map(r=>r.id===id?{...r,enabled:!r.enabled}:r));

  // Log volume chart data
  const hourBuckets=Object.fromEntries(Array.from({length:24},(_,i)=>[i,0]));
  alerts.forEach(a=>{
    try{const h=parseInt(a.timestamp.split(":")[0]);if(h>=0&&h<24)hourBuckets[h]++;}catch{}
  });
  const hours=Array.from({length:24},(_,i)=>({h:`${String(i).padStart(2,"0")}:00`,v:hourBuckets[i]||0}));
  const maxV=Math.max(...hours.map(h=>h.v),1);

  return (
    <div style={{padding:14,height:"100%",overflow:"hidden",display:"flex",flexDirection:"column",gap:10}}>

function SOARModule({alerts}) {
  const [sel,setSel]=useState(null);
  const [running,setRunning]=useState(null);
  const [step,setStep]=useState(-1);
  const [cases,setCases]=useState(()=>alerts.filter(a=>a.severity!=="LOW").slice(0,6).map(a=>({
    id:"CASE-"+uid(), created:ts(), title:a.rule, severity:a.severity,
    host:a.host, assignee:"analyst",
    status:a.status==="RESOLVED"?"CLOSED":a.status==="INVESTIGATING"?"IN PROGRESS":"OPEN",
    playbook:a.severity==="CRITICAL"?"Ransomware Response":a.severity==="HIGH"?"Incident Escalation":"Alert Triage", sla:"4h",
  })));
  const [execLog,setExecLog]=useState([]);

  const runPb=(pb)=>{
    setSel(pb); setRunning(pb.id); setStep(0);
    setExecLog([]);
    const run=i=>{
      if(i>=pb.steps.length){setRunning(null);setStep(-1);
        setExecLog(p=>[...p,{ts:ts(),msg:"OK Playbook execution complete",ok:true}]);
        return;
      }
      setStep(i);
      setExecLog(p=>[...p,{ts:ts(),msg:`Executing: ${pb.steps[i]}`,ok:false}]);
      setTimeout(()=>run(i+1),900);

// MODULE: HUNT  Threat Hunting

function HuntModule({alerts,onInvestigate}) {
  const [findings,setFindings]=useState([]);
  const [running,setRunning]=useState(null);

  const TACTICS=[
    {id:"beacon",name:"C2 Beaconing",desc:"Periodic callback patterns 5% interval",icon:"",mitre:"T1071.001"},
    {id:"cred",name:"Credential Stuffing",desc:"Password spray across multiple accounts",icon:"KEY",mitre:"T1110.003"},
    {id:"lateral",name:"Lateral Movement",desc:"Single user auth across many hosts",icon:"",mitre:"T1021.002"},
    {id:"staging",name:"Data Staging & Exfil",desc:"Bulk reads followed by large outbound",icon:"",mitre:"T1074.001"},
    {id:"lolbin",name:"Living-off-the-Land",desc:"PowerShell / MSHTA / Regsvr32 abuse",icon:"",mitre:"T1218"},
    {id:"hollow",name:"Process Hollowing",desc:"Unexpected parent-child chains",icon:"GHOST",mitre:"T1055.012"},
    {id:"dns",name:"DNS Tunneling",desc:"High-volume TXT queries for exfil",icon:"",mitre:"T1048.003"},
    {id:"travel",name:"Impossible Travel",desc:"Same user from multiple geos <1h",icon:"TRAVEL",mitre:"T1621"},
    {id:"persist",name:"Persistence Hunt",desc:"Autoruns, scheduled tasks, services",icon:"",mitre:"T1053"},
    {id:"shadow",name:"Ransomware Precursors",desc:"VSS deletion, encryption IOCs",icon:"",mitre:"T1490"},
  ];

  const runHunt=async(tactic)=>{
    setRunning(tactic.id);
    try {
      const r = await fetch("/api/hunt/run",{
        method:"POST",
        headers:{"Content-Type":"application/json",Authorization:"Bearer "+(window._secosToken||"")},
        body:JSON.stringify({tactic_id:tactic.id,tactic:tactic.name,mitre:tactic.mitre})
      });
      const d = r.ok ? await r.json() : null;
      if(d?.findings?.length){
        setFindings(p=>[...d.findings.map(f=>({...f,tactic:tactic.name,huntIcon:tactic.icon})),...p]);
      }
    } catch {}
    setRunning(null);
  };

  const runAll=async()=>{
    for(const t of TACTICS){
      await new Promise(r=>setTimeout(r,300));
      runHunt(t);
    }
  };

  return (
    <div style={{padding:14,height:"100%",overflow:"hidden",display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div>
          <div className="orb" style={{fontSize:12,color:C.accent,letterSpacing:3}}>THREAT HUNT ENGINE</div>
          <div style={{fontSize:11,color:C.text,marginTop:3}}>Proactively search for hidden threats across all data sources</div>
        </div>
        <button className="btn p" onClick={runAll} disabled={!!running}>SEARCH RUN ALL HUNTS</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,flex:1,overflow:"hidden"}}>
        {/* Tactic grid */}
        <div style={{overflow:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {TACTICS.map(t=>(
              <div key={t.id} className="card" style={{cursor:"pointer",
                borderColor:running===t.id?C.accent:C.border,
                background:running===t.id?"rgba(0,212,255,.04)":C.card}}
                onClick={()=>!running&&runHunt(t)}>
                <div style={{fontSize:20,marginBottom:6}}>{t.icon}</div>
                <div style={{color:C.textHi,fontSize:12,fontWeight:700,marginBottom:3}}>{t.name}</div>
                <div style={{color:C.text,fontSize:10,marginBottom:6}}>{t.desc}</div>
                <div className="mono" style={{fontSize:9,color:C.accentDim}}>{t.mitre}</div>
                {running===t.id&&<div style={{color:C.accent,fontSize:10,marginTop:6}} className="bk">SEARCH HUNTING</div>}
              </div>
            ))}
          </div>
        </div>

        {/* Findings */}
        <div className="card" style={{overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <Hdr>Hunt Findings ({findings.length})</Hdr>
            {findings.length>0&&<button className="btn" style={{fontSize:9,padding:"2px 7px"}} onClick={()=>setFindings([])}>CLEAR</button>}
          </div>
          <div style={{overflow:"auto",flex:1}}>
            {findings.length===0&&(
              <div style={{color:C.text,fontSize:12,textAlign:"center",marginTop:40}}>
                No findings yet  click a hunt tactic or run all
              </div>
            )}
            {findings.map(f=>(
              <div key={f.id} className="fi" style={{padding:"9px 10px",background:C.surface,
                border:`1px solid ${f.severity==="CRITICAL"?`rgba(255,34,68,.3)`:C.border}`,
                borderRadius:3,marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:16}}>{f.huntIcon}</span>
                    <span style={{color:C.textHi,fontSize:12,fontWeight:700}}>{f.tactic}</span>
                  </div>
                  <Badge sev={f.severity}/>
                </div>
                <div style={{display:"flex",gap:12,marginBottom:5,fontSize:11}}>
                  <span className="mono" style={{color:C.accent}}>{f.host}</span>
                  <span className="mono" style={{color:C.text}}>{f.src_ip}</span>
                  <span className="mono" style={{color:C.purple}}>{f.user}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span className="mono" style={{fontSize:9,color:C.accentDim}}>{f.mitre}</span>
                  <button className="btn p" style={{fontSize:9,padding:"2px 7px"}} onClick={()=>onInvestigate(f)}>INVESTIGATE</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


// MODULE: AEGIS  Autonomous AI Orchestration (Phase 5)

function AEGISModule({alerts,aegisLog}) {
  const [chains,setChains]=useState([]);
  const [selChain,setSel]=useState(null);
  const [mode,setMode]=useState("AUTONOMOUS");
  const [running,setRunning]=useState(false);

  const runChain=async(alert)=>{
    setRunning(true);
    const id=uid();
    const STEPS=[
      {type:"INGEST",   msg:`Event received: ${alert.rule} on ${alert.host}`},
      {type:"ANALYZE",  msg:`Severity: ${alert.severity}  Score: ${alert.score}  MITRE: ${alert.mitre}`},
      {type:"ENRICH",   msg:`IOC lookup: ${alert.src_ip}  checking threat intelligence...`},
      {type:"CORRELATE",msg:`Correlating events on ${alert.host} in past 24h...`},
      {type:"CONTEXT",  msg:`User ${alert.user}  checking UEBA risk profile...`},
      {type:"DECISION", msg:`Verdict: ${alert.severity==="CRITICAL"?"CONTAIN IMMEDIATELY":"INVESTIGATE"}  awaiting AEGIS analysis`},
      {type:"DISPATCH", msg:`Dispatching: TheHive case + ${alert.severity==="CRITICAL"?"SOAR isolation playbook":"SIEM watch rule"}`},
      {type:"COMPLETE", msg:`Chain resolved  AI analysis complete`},
    ];
    const chain={id,alert,steps:[],status:"running",started:ts()};
    setChains(p=>[chain,...p.slice(0,19)]);
    setSel(id);
    for(let s of STEPS){
      await new Promise(r=>setTimeout(r,550));
      setChains(p=>p.map(c=>c.id===id?{...c,steps:[...c.steps,{...s,ts:ts()}]}:c));
    }
    setChains(p=>p.map(c=>c.id===id?{...c,status:"resolved"}:c));
    setRunning(false);
  };

  const TYPE_COLOR={INGEST:C.text,ANALYZE:C.accent,ENRICH:C.cyan,CORRELATE:C.purple,CONTEXT:C.amber,DECISION:C.orange,DISPATCH:C.green,COMPLETE:C.green};

  return (
    <div style={{padding:14,height:"100%",overflow:"hidden",display:"flex",flexDirection:"column",gap:10}}>
      {/* Controls */}
      <div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
        <div className="orb" style={{fontSize:11,color:C.accent,letterSpacing:3}}>AEGIS MODE</div>
        {["AUTONOMOUS","SUPERVISED","PASSIVE"].map(m=>(
          <button key={m} className={`btn ${mode===m?"p":""}`} style={{fontSize:10}} onClick={()=>setMode(m)}>{m}</button>
        ))}
        <div style={{flex:1}}/>
        <button className="btn p" onClick={()=>alerts.length>0&&runChain(alerts[alerts.length-1])} disabled={running}>
          {running?" REASONING":" RUN ON LATEST ALERT"}
        </button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"260px 1fr 260px",gap:12,flex:1,overflow:"hidden"}}>
        {/* Chain list */}
        <div className="card" style={{overflow:"auto"}}>
          <Hdr>Reasoning Chains</Hdr>
          {chains.length===0&&<div style={{color:C.text,fontSize:11}}>No chains yet</div>}
          {chains.map(c=>(
            <div key={c.id} style={{padding:"8px 9px",marginBottom:5,cursor:"pointer",
              background:selChain===c.id?C.surface:C.bg,
              border:`1px solid ${selChain===c.id?C.accent:C.border}`,borderRadius:3}}
              onClick={()=>setSel(c.id)}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span className="mono" style={{fontSize:9,color:C.accentDim}}>#{c.id.slice(0,6)}</span>
                <span style={{fontSize:9,color:c.status==="resolved"?C.green:C.amber}} className={c.status==="running"?"bk":""}>
                  {c.status.toUpperCase()}
                </span>
              </div>
              <div style={{color:C.textHi,fontSize:11,fontWeight:600,marginBottom:2}}>{c.alert.rule}</div>
              <div className="mono" style={{fontSize:9,color:C.text}}>{c.steps.length}/8 steps  {c.started}</div>
            </div>
          ))}
        </div>

        {/* Chain steps */}
        <div className="card" style={{overflow:"auto"}}>
          {!selChain&&<div style={{color:C.text,fontSize:12,textAlign:"center",marginTop:60}}>Select a chain to view reasoning</div>}
          {selChain&&(()=>{
            const c=chains.find(x=>x.id===selChain);
            if(!c)return null;
            return (
              <>
                <Hdr>Chain {c.id.slice(0,6)}  {c.alert.host}</Hdr>
                <div style={{marginBottom:10,padding:"8px 10px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:3}}>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:11}}>
                    <span style={{color:C.text}}>Alert:</span><span style={{color:C.textHi}}>{c.alert.rule}</span>
                    <span style={{color:C.text}}>Sev:</span><Badge sev={c.alert.severity}/>
                    <span style={{color:C.text}}>Score:</span><span className="mono" style={{color:C.accent}}>{c.alert.score}</span>
                  </div>
                </div>
                {c.steps.map((s,i)=>(
                  <div key={i} className="fi" style={{display:"flex",gap:10,padding:"9px 10px",
                    background:C.surface,border:`1px solid ${s.type==="DECISION"?C.accent:s.type==="COMPLETE"?C.green:C.border}`,
                    borderRadius:3,marginBottom:6}}>
                    <span style={{fontSize:9,padding:"2px 6px",background:C.card,border:`1px solid ${C.border}`,borderRadius:2,
                      color:TYPE_COLOR[s.type]||C.text,flexShrink:0,height:"fit-content",fontFamily:"'Share Tech Mono',monospace"}}>
                      {s.type}
                    </span>
                    <div style={{flex:1}}>
                      <div style={{color:C.textHi,fontSize:12}}>{s.msg}</div>
                      <div className="mono" style={{fontSize:9,color:C.text,marginTop:2}}>{s.ts}</div>
                    </div>
                  </div>
                ))}
                {c.status==="running"&&(
                  <div style={{display:"flex",alignItems:"center",gap:8,color:C.accent,fontSize:12,padding:"8px 10px"}}>
                    <span className="spin">O</span> AEGIS reasoning in progress
                  </div>
                )}
              </>
            );
          })()}
        </div>

        {/* Live AEGIS log */}
        <div className="card" style={{overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <Hdr>Autonomous Action Log</Hdr>
          <div style={{overflow:"auto",flex:1}}>
            {aegisLog.slice(-30).reverse().map((e,i)=>(
              <div key={i} className="log">
                <span style={{color:C.accentDim}}>[{e.ts}]</span>{" "}
                <span style={{color:e.msg.includes("CRITICAL")||e.msg.includes("CONTAIN")?C.red:e.msg.includes("ACTION")?C.green:C.textHi,fontSize:10}}>
                  {e.msg}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function SecOS() {
  S();
  const [session,setSession]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [alerts,setAlerts]=useState([]);
  
  const [inspecting,setInspecting]=useState(null);
  const [risk,setRisk]=useState(0);
  const [aegisLog,setAegisLog]=useState([]);
  const [apiOnline,setApiOnline]=useState(false);
  const [wsConnected,setWsConnected]=useState(false);
  const alertSeq=useRef(1);

  const TOKEN = () => session?.token || "";

  const apiFetch = async (path) => {
    try {
      const r = await fetch("/api"+path, {
        headers: TOKEN() ? {Authorization:"Bearer "+TOKEN()} : {}
      });
      if(!r.ok) return null;
      return r.json();
    } catch { return null; }
  };

  const mapAlert = (a,seq) => ({
    id: String(a.event_id||a.id||Math.random()),
    seq: seq||a.id||0,
    timestamp: a.timestamp ? new Date(a.timestamp).toLocaleTimeString("en-GB",{hour12:false}) : new Date().toLocaleTimeString("en-GB",{hour12:false}),
    rule: a.rule||a.rule_name||"Unknown",
    mitre: a.mitre_id||a.mitre||"",
    tactic: a.tactic||"",
    severity: (a.severity||"LOW").toUpperCase(),
    host: a.host||a.hostname||"",
    src_ip: a.src_ip||a.source_ip||"",
    user: a.user_name||a.user||"",
    score: a.score||0,
    status: a.status||"NEW",
    source: a.source||a.agent||"SIEM",
    decision: a.decision||null,
    apt: a.apt||null,
  });

  const loadAlerts = async () => {
    const data = await apiFetch("/alerts?limit=2000");
    if(data?.alerts?.length){
      const mapped = data.alerts.map((a,i) => mapAlert(a, data.alerts.length - i));
      setAlerts(mapped.slice(0,2000));
      const crit = mapped.filter(a=>a.severity==="CRITICAL").length;
      const high = mapped.filter(a=>a.severity==="HIGH").length;
      setRisk(Math.min(100, crit*8 + high*3));
    }
  };

  const loadAegisHistory = async () => {
    const data = await apiFetch("/aegis/history");
    if(data?.chains?.length){
      const logs = [];
      data.chains.slice(0,50).forEach(chain => {
        if(chain.steps) chain.steps.forEach(s => {
          logs.push({ts: new Date(s.timestamp||Date.now()).toLocaleTimeString("en-GB",{hour12:false}), type:s.type, msg:s.msg||""});
        });
      });
      setAegisLog(logs);
    }
  };

  useEffect(()=>{
    if(!session) return;

    // Initial data load
    loadAlerts();
    loadAegisHistory();

    // Health check
    apiFetch("/health").then(d => {
      if(d?.status==="online") setApiOnline(true);
    });

    // WebSocket live feed
    const proto = window.location.protocol==="https:"?"wss:":"ws:";
    let ws, wsTimer;
    const connect = () => {
      try {
        ws = new WebSocket(proto+"//"+window.location.host+"/ws");
        ws.onopen = () => { setWsConnected(true); };
        ws.onclose = () => {
          setWsConnected(false);
          wsTimer = setTimeout(connect, 5000); // reconnect
        };
        ws.onerror = () => ws.close();
        ws.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            const payload = msg.data||msg;
            // New alert
            if(payload.rule||payload.rule_name){
              const a = mapAlert(payload, alertSeq.current++);
              /* ws alert handled by next poll */
              setRisk(r=>Math.min(100,Math.max(0,
                r+(a.severity==="CRITICAL"?8:a.severity==="HIGH"?3:a.severity==="MEDIUM"?1:-1)
              )));
            }
            // AEGIS chain update
            if(payload.chain_id||payload.type==="AEGIS"){
              const step = payload;
              setAegisLog(p=>[...p.slice(-199),{
                ts: new Date().toLocaleTimeString("en-GB",{hour12:false}),
                type: step.type||"INFO",
                msg: step.msg||step.message||JSON.stringify(step).slice(0,80)
              }]);
            }
          } catch {}
        };
      } catch { wsTimer = setTimeout(connect, 5000); }
    };
    connect();

    // Poll every 30s for missed alerts
    const pollTimer = setInterval(loadAlerts, 30000);

    return () => {
      if(ws) ws.close();
      clearTimeout(wsTimer);
      clearInterval(pollTimer);
    };
  },[session]);
  if(!session) return <Login onLogin={setSession}/>;

  return (
    <div className="v6">
      <div className="gbg"/><div className="scan"/>
      <TopBar session={session} alerts={alerts} risk={risk} onLogout={()=>setSession(null)} apiOnline={apiOnline} wsConnected={wsConnected}/>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",gap:0,flexShrink:0,position:"relative",zIndex:5,overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
      </div>
      <div style={{flex:1,overflow:"hidden",position:"relative",zIndex:2}}>
        {tab==="dashboard"  && <DashboardModule  alerts={alerts} onInvestigate={setInspecting}/>}
        {tab==="alerts"     && <AlertsModule     alerts={alerts} onInvestigate={setInspecting}/>}
        {tab==="siem"       && <SIEMModule       alerts={alerts}/>}
        {tab==="edr"        && <EDRModule        alerts={alerts} onInvestigate={setInspecting}/>}
        {tab==="ndr"        && <NDRModule        alerts={alerts}/>}
        {tab==="soar"       && <SOARModule       alerts={alerts}/>}
        {tab==="hunt"       && <HuntModule       alerts={alerts} onInvestigate={setInspecting}/>}
        {tab==="xdr"        && <XDRModule        alerts={alerts}/>}
        {tab==="iam"        && <IAMModule        alerts={alerts}/>}
        {tab==="ueba"       && <UEBAModule       alerts={alerts}/>}
        {tab==="tip"        && <TIPModule        alerts={alerts}/>}
        {tab==="vuln"       && <VulnModule/>}
        {tab==="sensors"    && <SensorsModule    alerts={alerts}/>}
        {tab==="aegis"      && <AEGISModule      alerts={alerts} aegisLog={aegisLog}/>}
        {tab==="compliance" && <ComplianceModule alerts={alerts}/>}
        {tab==="kernel"     && <KernelModule     alerts={alerts} aegisLog={aegisLog}/>}
      </div>
      {inspecting&&(
        <>
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:99}} onClick={()=>setInspecting(null)}/>
          <InvestPanel alert={inspecting} onClose={()=>setInspecting(null)} session={session}
            onDecision={(decision,rationale)=>{
              setAlerts(p=>p.map(a=>a.id===inspecting.id?{...a,status:"RESOLVED",decision}:a));
              setAegisLog(p=>[...p,{ts:ts(),type:"ACTION",msg:`[${session.user.toUpperCase()}] ${decision} on ${inspecting.id}  ${rationale.slice(0,50)}`}]);
              setInspecting(null);
            }}/>
        </>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SecOS));
    const boot = document.getElementById('boot');
    if(boot){boot.style.transition='opacity 0.5s';setTimeout(()=>{boot.style.opacity='0';setTimeout(()=>boot.remove(),500);},800);}
  </script>
</body>
</html>
